{{- /* Pagefind Search Modal */}}
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<div id="search-modal" class="search-modal" aria-hidden="true">
  <div class="search-modal__overlay"></div>
  <div class="search-modal__content">
    <div class="search-modal__header">
      <h2 class="search-modal__title">{{ i18n "search" | default "Suche" }}</h2>
      <button class="search-modal__close" id="search-close" aria-label="{{ i18n "search_close" | default "Schließen" }}">&times;</button>
    </div>
    <div id="search-widget">
      <p class="search-fallback">{{ i18n "search_fallback" | default "Search wird geladen …" }}</p>
    </div>
  </div>
</div>
