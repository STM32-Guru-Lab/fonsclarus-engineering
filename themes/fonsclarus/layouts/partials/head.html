<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>
    {{- if .IsHome -}}
      {{ site.Title }}
    {{- else -}}
      {{ .Title }} &mdash; {{ site.Title }}
    {{- end -}}
  </title>

  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">

  {{- with .Keywords -}}
    <meta name="keywords" content="{{ delimit . ", " }}">
  {{- end }}

  {{- /* Open Graph */}}
  <meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} &mdash; {{ site.Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ site.Title }}">

  {{- /* Canonical URL */}}
  <link rel="canonical" href="{{ .Permalink }}">

  {{- /* RSS */}}
  {{ with .OutputFormats.Get "rss" -}}
    <link rel="alternate" type="application/rss+xml" title="{{ site.Title }}" href="{{ .Permalink }}">
  {{- end }}

  {{- /* Stylesheet */}}
  {{ with (resources.Get "css/main.css") | toCSS | minify | fingerprint }}
    <link rel="stylesheet" href="{{ .RelPermalink }}" integrity="{{ .Data.Integrity }}" crossorigin="anonymous">
  {{ end }}
</head>
