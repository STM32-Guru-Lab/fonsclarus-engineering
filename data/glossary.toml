# Glossary of technical terms for hover tooltips
# Usage in markdown: {{< gloss "TERM" >}}
# Terms are case-sensitive — use exact key as shown here.
# Section headers with spaces/hyphens MUST be quoted: ["term name"]

[GPIO]
label = "GPIO"
definition = "General Purpose Input/Output — Ein programmierbarer Pin des Mikrocontrollers, der entweder als Ein- oder Ausgang konfiguriert werden kann."

[BSRR]
label = "BSRR"
definition = "Bit Set/Reset Register — Ein Peripherie-Register des STM32, mit dem einzelne GPIO-Pins atomar (in einem einzigen Taktzyklus) gesetzt oder zurückgesetzt werden können, ohne dass ein Read-Modify-Write nötig ist."

[ODR]
label = "ODR"
definition = "Output Data Register — Das Ausgabedatenregister eines GPIO-Ports. Ein Schreibzugriff setzt alle Pins des Ports gleichzeitig — allerdings nicht atomar, da ein Read-Modify-Write stattfindet."

[IDR]
label = "IDR"
definition = "Input Data Register — Das Eingabedatenregister eines GPIO-Ports. Über dieses Register wird der aktuelle Pegel der Eingangspins ausgelesen."

[CRL]
label = "CRL"
definition = "Configuration Register Low — Steuert die Konfiguration der GPIO-Pins 0–7 eines Ports, inklusive Input/Output-Modus und Output-Speed (MODE-Bits). Siehe RM0008, Kapitel 9.2."

[CRH]
label = "CRH"
definition = "Configuration Register High — Steuert die Konfiguration der GPIO-Pins 8–15 eines Ports, analog zum CRL-Register. Siehe RM0008, Kapitel 9.2."

[HAL]
label = "HAL"
definition = "Hardware Abstraction Layer — Die von STMicroelectronics bereitgestellte Abstraktionsschicht für die STM32-Familie. Ermöglicht plattformunabhängigen Zugriff auf Peripherie, erzeugt aber Code-Overhead durch viele Funktionsaufrufe."

[CMSIS]
label = "CMSIS"
definition = "Cortex Microcontroller Software Interface Standard — Ein vendorunabhängiger Hardware-Abstraktions-Standard von ARM für Cortex-M-basierte Mikrocontroller. Stellt Registerdefinitionen und intrinsische Funktionen bereit."

[SRAM]
label = "SRAM"
definition = "Static Random Access Memory — Der interne Arbeitsspeicher des Mikrocontrollers. Wird für Variablen, Stack und Heap genutzt. Beim STM32F103 stehen zwischen 6 und 20 KB zur Verfügung, je nach Variante."

[ISR]
label = "ISR"
definition = "Interrupt Service Routine — Eine spezielle Funktion, die automatisch aufgerufen wird, wenn ein bestimmtes Interrupt-Ereignis (z. B. Timer-Überlauf, Pin-Zustandsänderung) eintritt."

[EMV]
label = "EMV"
definition = "Elektromagnetische Verträglichkeit — Die Fähigkeit eines Geräts, in seiner elektromagnetischen Umgebung störungsfrei zu arbeiten, ohne andere Geräte übermäßig zu beeinflussen."

["MODE-Bits"]
label = "MODE-Bits"
definition = "Die zwei Konfigurationsbits (MODE[1:0]) in den CRL/CRH-Registern eines GPIO-Pins. Legen fest, ob der Pin als Eingang (00) oder als Ausgang mit bestimmter Flankensteilheit (01=10 MHz, 10=2 MHz, 11=50 MHz) arbeitet."

["Slew Rate"]
label = "Slew Rate"
definition = "Flankensteilheit — Die Änderungsrate der Spannung pro Zeiteinheit (V/µs oder V/ns). Eine hohe Slew Rate bedeutet steilere Flanken, aber auch mehr Überschwinger und höhere EMV-Abstrahlung."

[Overshoot]
label = "Overshoot"
definition = "Überschwinger — Ein kurzzeitiges Überschreiten des Ziel-Spannungspegels nach einer Flanke. Tritt bei zu steilen Flanken auf und kann benachbarte Signale beeinflussen (Crosstalk)."

[Ringing]
label = "Ringing"
definition = "Einschwingen / Nachschwingen — Gedämpfte Oszillation des Signals nach einer Flanke, verursacht durch Leitungsinduktivitäten und parasitäre Kapazitäten. Besonders ausgeprägt bei hoher Slew Rate."

[PLL]
label = "PLL"
definition = "Phase-Locked Loop — Ein Taktgenerator, der aus einem Referenztakt (z. B. 8 MHz HSI) einen höheren Systemtakt (z. B. 72 MHz) erzeugt. Der STM32F103 nutzt die PLL, um den maximalen Takt zu erreichen."

[HSI]
label = "HSI"
definition = "High-Speed Internal Oscillator — Der interne RC-Oszillator des STM32 mit 8 MHz. Dient als Standard-Taktquelle nach dem Reset, ist aber weniger genau als ein externer Quarz."

[HSE]
label = "HSE"
definition = "High-Speed External Oscillator — Ein externer Quarzoszillator (z. B. 8 MHz auf dem Nucleo-Board), der als präzise Taktquelle für die PLL und den Systemtakt dient."

["Read-Modify-Write"]
label = "Read-Modify-Write (RMW)"
definition = "Ein Lese-Ändere-Schreibe-Zugriff auf ein Register. Die CPU liest den aktuellen Wert (LDR), manipuliert ihn (XOR/AND/OR) und schreibt das Ergebnis zurück (STR). Diese Sequenz ist nicht atomar — ein Interrupt zwischen LDR und STR kann zu Race Conditions führen. Der ODR-XOR-Zugriff ist ein typisches Beispiel: `GPIOB->ODR ^= GPIO_ODR_ODR8` wird zu LDR → EOR → STR."

[Inlining]
label = "Inlining"
definition = "Eine Compiler-Optimierung, bei der der Funktionskörper direkt an der Aufrufstelle eingefügt wird, statt einen BL (Branch-and-Link)-Aufruf zu erzeugen. Spart Aufruf-Overhead, vergrößert aber den Code. GCC aktiviert `-finline-functions` ab `-O2`, aber ohne LTO (`-flto`) nur innerhalb derselben Übersetzungseinheit (`.c`-Datei)."

[LTO]
label = "LTO"
definition = "Link-Time Optimization — Eine Compiler-Optimierung (`-flto`), die über Übersetzungseinheiten hinweg arbeitet. Erlaubt Inlining und Konstantenweitergabe auch über `.c`-Dateigrenzen hinweg. Ohne LTO sieht der Compiler beim Übersetzen von `main.c` nicht den Code aus `stm32f1xx_hal_gpio.c` — Funktionsaufrufe wie `HAL_GPIO_TogglePin()` bleiben deshalb erhalten."

["Constant Hoisting"]
label = "Constant Hoisting"
definition = "Eine Compiler-Optimierung, bei der konstante Werte (Adressen, Bitmasken) aus einer Schleife herausgezogen und einmal vor der Schleife in Registern bereitgestellt werden. Spart Lade-Instruktionen pro Iteration. Beispiel BSRR bei `-O2`: `mov.w r1, #256` und `mov.w r2, #16777216` werden vor die `while(1)`-Schleife gezogen."

["Literal Pool"]
label = "Literal Pool"
definition = "Ein Speicherbereich im Code-Segment (Flash), in dem der ARM-Compiler Konstanten wie Adressen oder große Zahlenwerte ablegt. Der Zugriff erfolgt über PC-relatives Laden mit `ldr r3, [pc, #offset]`. Auf dem STM32 im Thumb-Modus sind Literal Pools oft nach langen Sprungtabellen oder am Ende von Funktionen zu finden."

["Alternate Function"]
label = "Alternate Function"
definition = "Ein GPIO-Pin-Modus des STM32, bei dem der Pin nicht von Software (GPIO-Ausgang), sondern von einer Peripherie-Einheit (SPI, UART, Timer) gesteuert wird. Konfiguriert über die MODE-Bits und CNF-Bits in den CRL/CRH-Registern. Siehe RM0008, Kapitel 9.2."

[Crosstalk]
label = "Crosstalk"
definition = "Übersprechen — Unerwünschte kapazitive oder induktive Kopplung zwischen benachbarten Signalleitungen. Eine steile Spannungsflanke auf einer Leitung kann durch parasitäre Kapazitäten einen Spannungsimpuls auf der Nachbarleitung induzieren. Besonders kritisch bei hoher Slew Rate und langen, parallelen Leiterbahnen."

["Race Condition"]
label = "Race Condition"
definition = "Wettlaufsituation — Ein unerwarteter Systemzustand, der entsteht, wenn zwei oder mehr Codepfade (z. B. Hauptschleife und ISR) gleichzeitig auf denselben Speicherbereich zugreifen und das Ergebnis von der zeitlichen Reihenfolge der Zugriffe abhängt. Der ODR-Read-Modify-Write-Zugriff ist anfällig: Unterbricht ein Interrupt zwischen LDR und STR, geht die Änderung verloren."

["Critical Section"]
label = "Critical Section"
definition = "Ein Codeabschnitt, der nicht von Interrupts unterbrochen werden darf, weil er auf gemeinsame Ressourcen (z. B. ein ODR-Register oder globale Variablen) zugreift. Geschützt durch Deaktivieren und Reaktivieren von Interrupts (`cpsid i` / `cpsie i`). BSRR-Zugriffe sind inhärent atomar und benötigen keine Critical Sections."

[PWM]
label = "PWM"
definition = "Pulse Width Modulation — Ein Verfahren zur Erzeugung eines digitalen Signals mit variabler Pulsbreite bei fester Frequenz, typischerweise über einen Hardware-Timer. Das Tastverhältnis (Duty Cycle) bestimmt die effektive Spannung oder Leistung. Wird für Motoransteuerung, LED-Dimmung und Signalgenerierung eingesetzt."

[DMA]
label = "DMA"
definition = "Direct Memory Access — Ein Peripherie-Modul des Mikrocontrollers, das Daten zwischen Peripherie (z. B. SPI, ADC, USART) und Speicher transferieren kann, ohne die CPU zu belasten. Ermöglicht parallele Datenbewegung im Hintergrund und reduziert die CPU-Auslastung bei datenintensiven Anwendungen auf ein Minimum."

[NOP]
label = "NOP"
definition = "No Operation — Eine CPU-Instruktion, die keinen Effekt hat außer einen Taktzyklus zu verbrauchen. In ARM-Thumb als `mov r8, r8` oder `nop` codiert. Wird für präzise Timing-Verzögerungen, als Platzhalter im Assembler oder zum Auffüllen von Pipeline-Stufen verwendet."
